<html lang="pt-br">
<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .lp-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            position: relative;
            /* Fundo com imagem e gradiente para escurecer a base */
            background-image: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.9) 80%), url('5.png');
            
            /* AJUSTE DA IMAGEM: Sem repetição e zoom controlado */
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center top; /* Foca no topo da imagem para diminuir o zoom no rosto */
            
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 30px 10px;
            text-align: center;
        }

        .headline-container {
            background-color: #ff0000; /* Corrigido para Vermelho para combinar com o botão */
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .headline-text {
            color: #ffffff !important;
            font-size: 26px;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1.2;
        }

        .description {
            background-color: #ffffff; /* Corrigido de #FFFFF para #FFFFFF */
            color: #000000 !important;
            font-size: 15px;
            font-weight: bold;
            padding: 12px 15px;
            margin-bottom: 30px;
            line-height: 1.4;
            border-radius: 8px;
        }

        .highlight-red {
            color: #ff0000 !important;
            font-weight: 900;
        }

        .btn-entrar {
            background-color: #ff0000;
            color: #fff !important;
            text-decoration: none;
            font-size: 22px;
            font-weight: bold;
            padding: 20px;
            border-radius: 12px;
            text-transform: uppercase;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.6);
            transition: 0.3s;
            margin-bottom: 30px;
            display: block;
        }

        .btn-entrar:active { transform: scale(0.95); }

        .social-proof {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 20px;
        }

        .avatars { display: flex; }
        .avatars img {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 2px solid #fff;
            margin-left: -12px;
        }
        .avatars img:first-child { margin-left: 0; }
        
        .proof-text { font-size: 13px; color: #eee; font-weight: bold; }
    </style>
</head>
<body>

    <div class="lp-container">
        <div class="headline-container">
            <h1 class="headline-text">ACESSO LIBERADO PARA MINHA<br>ENTRADA PESSOAL</h1>
        </div>

        <p class="description">
            Fale comigo <span class="highlight-red">AGORA</span> para ter acesso ao meu bilhete com as melhores análises para os jogos de <span class="highlight-red">HOJE</span>.
        </p>

        <a href="https://redirecionar.online/" class="btn-entrar" onclick="trackClick()">GARANTIR O BILHETE</a>

        <div class="social-proof">
            <div class="avatars">
                <img src="https://i.pravatar.cc/100?u=11" alt="Membro">
                <img src="https://i.pravatar.cc/100?u=12" alt="Membro">
                <img src="https://i.pravatar.cc/100?u=13" alt="Membro">
                <img src="https://i.pravatar.cc/100?u=14" alt="Membro">
            </div>
            <span class="proof-text">Pessoas reais com resultados reais</span>
        </div>
    </div>

    <script>
    function trackClick() {
        fbq('track', 'Lead');
        console.log("Lead disparado!");
    }
    </script>

</body>
</html>
